# Alerting Rules (CRITICAL — Governance Layer)


---

```yaml
groups:
- name: psgf-slo-alerts
  rules:

  - alert: HighErrorBudgetBurn
    expr: (
      (1 - (sum(rate(app_requests_total{status="success"}[5m])) 
      / sum(rate(app_requests_total[5m]))))
      / (1 - 0.999)
    ) > 2
    for: 10m
    labels:
      severity: critical
    annotations:
      summary: "High error budget burn rate"
      description: "Trigger governance controls (deployment restriction)"

  - alert: SLOBreach
    expr: (
      sum(rate(app_requests_total{status="success"}[5m]))
      /
      sum(rate(app_requests_total[5m]))
    ) < 0.999
    for: 15m
    labels:
      severity: high
    annotations:
      summary: "SLO breach detected"
      description: "Initiate incident response and policy enforcement"
